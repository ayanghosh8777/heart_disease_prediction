<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | HeartGuard AI</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

            background: linear-gradient(
                135deg,
                #061a14,
                #0b3d2e,
                #06251d
            );

            position: relative;
        }

        /* Animated Background Circles */

        .circle {

            position: absolute;

            border-radius: 50%;

            opacity: 0.25;

            filter: blur(2px);

            animation: float 8s infinite ease-in-out;
        }

        .circle1 {

            width: 350px;

            height: 350px;

            background: #00e676;

            top: -120px;

            left: -100px;
        }

        .circle2 {

            width: 280px;

            height: 280px;

            background: #00bfa5;

            bottom: -100px;

            right: -80px;

            animation-delay: 2s;
        }

        .circle3 {

            width: 180px;

            height: 180px;

            background: #69f0ae;

            top: 50%;

            right: 20%;

            animation-delay: 4s;
        }

        @keyframes float {

            0%, 100% {

                transform: translateY(0px);

            }

            50% {

                transform: translateY(-30px);

            }

        }

        /* Login Card */

        .login-card {

            width: 420px;

            padding: 40px;

            background: rgba(255, 255, 255, 0.1);

            border: 1px solid rgba(255, 255, 255, 0.2);

            backdrop-filter: blur(18px);

            border-radius: 25px;

            box-shadow:

                0 25px 50px rgba(0, 0, 0, 0.4);

            color: white;

            animation: slideUp 1s ease forwards;

            z-index: 2;
        }

        @keyframes slideUp {

            from {

                opacity: 0;

                transform: translateY(50px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

        /* Logo */

        .logo {

            width: 70px;

            height: 70px;

            margin: auto;

            display: flex;

            justify-content: center;

            align-items: center;

            border-radius: 50%;

            background: linear-gradient(

                135deg,

                #00e676,

                #00bfa5

            );

            font-size: 35px;

            box-shadow:

                0 0 25px rgba(0, 230, 118, 0.6);

            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0% {

                box-shadow:

                    0 0 0 0 rgba(0, 230, 118, 0.6);

            }

            70% {

                box-shadow:

                    0 0 0 15px rgba(0, 230, 118, 0);

            }

            100% {

                box-shadow:

                    0 0 0 0 rgba(0, 230, 118, 0);

            }

        }

        h1 {

            text-align: center;

            margin-top: 20px;

            font-size: 30px;

            letter-spacing: 1px;
        }

        .subtitle {

            text-align: center;

            margin-top: 8px;

            margin-bottom: 30px;

            color: #b9d8ce;

            font-size: 14px;
        }

        /* Input Fields */

        .input-group {

            margin-bottom: 22px;
        }

        .input-group input {

            width: 100%;

            padding: 14px 16px;

            border: none;

            outline: none;

            border-radius: 12px;

            background: rgba(255, 255, 255, 0.12);

            border: 1px solid rgba(255, 255, 255, 0.2);

            color: white;

            font-size: 15px;

            transition: 0.3s;
        }

        .input-group input::placeholder {

            color: #b8ccc6;
        }

        .input-group input:focus {

            border-color: #00e676;

            box-shadow:

                0 0 12px rgba(0, 230, 118, 0.5);

            transform: scale(1.02);
        }

        /* Login Button */

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(

                135deg,

                #00e676,

                #00bfa5

            );

            color: #03251b;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            margin-top: 10px;
        }

        button:hover {

            transform: translateY(-3px);

            box-shadow:

                0 10px 25px rgba(0, 230, 118, 0.4);
        }

        button:active {

            transform: scale(0.97);
        }

        /* Signup Link */

        .signup-text {

            text-align: center;

            margin-top: 25px;

            color: #b9d8ce;

            font-size: 14px;
        }

        .signup-text a {

            color: #00e676;

            text-decoration: none;

            font-weight: bold;

            transition: 0.3s;
        }

        .signup-text a:hover {

            color: #69f0ae;

            text-decoration: underline;
        }

        /* Responsive */

        @media (max-width: 500px) {

            .login-card {

                width: 90%;

                padding: 30px 25px;
            }
        }

    </style>

</head>


<body>


    <!-- Animated Background -->

    <div class="circle circle1"></div>

    <div class="circle circle2"></div>

    <div class="circle circle3"></div>


    <!-- Login Card -->

    <div class="login-card">


        <div class="logo">

            ❤️

        </div>


        <h1>

            Welcome Back

        </h1>


        <p class="subtitle">

            Login to continue to HeartGuard AI

        </p>


        <form method="POST">


            <div class="input-group">

                <input

                    type="email"

                    name="email"

                    placeholder="Email Address"

                    required

                >

            </div>


            <div class="input-group">

                <input

                    type="password"

                    name="password"

                    placeholder="Password"

                    required

                >

            </div>


            <button type="submit">

                Login

            </button>


        </form>


        <p class="signup-text">

            Don't have an account?


            <a href="{{ url_for('signup') }}">

                Sign Up

            </a>

        </p>


    </div>


</body>

</html>
